{% extends "base.html" %}
{% block title %}Registrar Propietario{% endblock %}
{% block content %}

<div class="form-container">
  <h2>Registrar nuevo propietario</h2>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-guardar">Guardar</button>
  </form>

  <!-- Enlace corregido con namespace -->
  <p style="text-align: center;">
    <a href="{% url 'interfaz:propietario_list' %}">Volver al listado</a>
  </p>
</div>

{% endblock %}
