{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Clínica Veterinaria{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'interfaz/css/estilos.css' %}">
</head>
<body>

    <div class="logo-container">
        <img src="{% static 'img/logo.png' %}" alt="Logo" class="logo">
    </div>

    <nav class="navbar">
        <ul class="menu">
            <li><a href="{% url 'interfaz:inicio' %}">Inicio</a></li>
            <li><a href="{% url 'interfaz:servicios' %}">Servicios</a></li>
            <li><a href="{% url 'interfaz:propietario_list' %}">Propietarios</a></li>
            <li><a href="{% url 'interfaz:mascota_list' %}">Mascotas</a></li>
            <li><a href="{% url 'interfaz:cita_list' %}">Citas</a></li>
            <li>Más</li>
        </ul>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>© 2025 Clínica Veterinaria. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
