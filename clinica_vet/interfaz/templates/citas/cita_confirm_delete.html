{% extends "base.html" %}
{% block title %}Eliminar cita{% endblock %}
{% block content %}
  <h2>Eliminar cita</h2>
  <p>¿Seguro que deseas eliminar la cita de <strong>{{ cita.mascota.nombre }}</strong> del {{ cita.fecha }} a las {{ cita.hora }}?</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn-eliminar" type="submit">Eliminar</button>
    <a href="{% url 'interfaz:cita_list' %}">Cancelar</a>
  </form>
{% endblock %}
